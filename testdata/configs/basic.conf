# Sample wgturn-aware WireGuard configuration. Standard wg-quick tools
# treat the #@wgt: lines as comments; wgturn-core reads them.

[Interface]
PrivateKey = AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
Address    = 10.7.0.2/32
DNS        = 10.7.0.1

#@wgt:EnableTURN      = true
#@wgt:Mode            = vk_link
#@wgt:VkLink          = https://vk.com/call/join/example-id
#@wgt:PeerType        = proxy_v2
#@wgt:Streams         = 4
#@wgt:StreamsPerCred  = 4
#@wgt:WatchdogTimeout = 30s
#@wgt:Peer            = vps.example.com:56000
#@wgt:LocalListen     = 127.0.0.1:9000

[Peer]
PublicKey  = BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBA=
Endpoint   = 127.0.0.1:9000
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
