# Forgejo Actions / Gitea Actions compatible CI.
#
# We deliberately do not use any forge-specific extensions: the steps
# below run identically on github.com if you ever need to mirror.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: build + vet + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # Install Go directly. actions/setup-go@v5 occasionally hangs on
      # our forgejo-runner after `go env`, with no log diagnostics —
      # bypassing it makes setup deterministic and ~5 s instead of
      # ~60 s of action plumbing.
      - name: install Go
        run: |
          GO_VERSION=1.25.5
          curl -sSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" \
            | tar -xz -C /usr/local
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: download
        run: |
          export PATH=/usr/local/go/bin:$PATH
          go mod download

      - name: build
        run: |
          export PATH=/usr/local/go/bin:$PATH
          go build ./...

      - name: vet
        run: |
          export PATH=/usr/local/go/bin:$PATH
          go vet ./...

      # NOTE: -race is intentionally NOT enabled in CI. The default
      # node:22-bookworm runner image has no gcc, so cgo-dependent
      # builds (which -race requires) hang in obscure ways inside
      # act's process management. Local devs can run `make race`.
      # Re-enable here once we have a runner image with gcc + libc-dev.
      - name: test (coverage)
        env:
          CGO_ENABLED: "0"
        run: |
          export PATH=/usr/local/go/bin:$PATH
          go test ./... \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: coverage summary
        run: |
          export PATH=/usr/local/go/bin:$PATH
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          go tool cover -func=coverage.out | tee /tmp/cover.out
          # Job summary works on both GitHub and Forgejo Actions; skip if
          # the runtime doesn't expose $GITHUB_STEP_SUMMARY.
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            { echo '```'; tail -30 /tmp/cover.out; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi
        # NOTE: actions/upload-artifact@v4+ depends on the GHES artifact
        # API which Forgejo does not implement. If you need persistent
        # coverage history, push to Codecov or commit the file via a
        # forgejo-only step instead.

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # cache: false — Forgejo's cache server times out and setup-go's
          # restore step hangs the whole workflow. Re-enable when the
          # internal cache backend is wired up.
          cache: false
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...
