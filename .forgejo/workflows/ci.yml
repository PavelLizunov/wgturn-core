# Forgejo Actions / Gitea Actions compatible CI.
#
# We deliberately do not use any forge-specific extensions: the steps
# below run identically on github.com if you ever need to mirror.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: build + vet + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: download
        run: go mod download

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      # Race-detector run requires CGO; ubuntu-latest has gcc by default.
      - name: test (race + coverage)
        env:
          CGO_ENABLED: "1"
        run: |
          go test ./... \
            -race \
            -timeout 120s \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: coverage summary
        run: |
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          go tool cover -func=coverage.out | tee /tmp/cover.out
          # Job summary works on both GitHub and Forgejo Actions; skip if
          # the runtime doesn't expose $GITHUB_STEP_SUMMARY.
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            { echo '```'; tail -30 /tmp/cover.out; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          fi
        # NOTE: actions/upload-artifact@v4+ depends on the GHES artifact
        # API which Forgejo does not implement. If you need persistent
        # coverage history, push to Codecov or commit the file via a
        # forgejo-only step instead.

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...
