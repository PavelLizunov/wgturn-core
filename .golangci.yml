# golangci-lint configuration
# Tuned for a young codebase: pragmatic, not pedantic.

run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - exhaustive
    - gocheckcompilerdirectives
    - goconst
    - gofmt
    - goimports
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/PavelLizunov/wgturn-core
  revive:
    rules:
      - name: package-comments
      - name: var-naming
      - name: indent-error-flow
      - name: error-return
      - name: error-strings

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - bodyclose
  max-same-issues: 0
  max-issues-per-linter: 0
